server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    include /etc/nginx/mime.types;
    types {
        application/manifest+json  webmanifest;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json application/manifest+json image/svg+xml;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Service worker + manifest — must not be cached
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Hashed static assets — safe to cache long-term
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public";
    }

    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
