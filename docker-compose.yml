# Compose loads a file named `.env` in this directory for ${VAR} substitution (not committed).
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:?Add VITE_SUPABASE_URL to .env — see .env.example}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:?Add VITE_SUPABASE_ANON_KEY to .env}
    ports:
      - "${HOST_PORT:-8080}:80"
    restart: unless-stopped
